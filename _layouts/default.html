<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f4f5f7;
            color: #111827;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 네비게이션 ── */
        .nav {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 48px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 500;
            color: #111827;
            text-decoration: none;
        }

        .nav-logo span {
            color: #6366f1;
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.12s, color 0.12s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #f3f4f6;
            color: #111827;
        }

        .nav-badge {
            font-size: 11px;
            font-weight: 600;
            background: #eef2ff;
            color: #4f46e5;
            padding: 3px 9px;
            border-radius: 20px;
        }

        /* ── 컨텐츠 ── */
        .content {
            flex: 1;
        }

        /* ── 푸터 ── */
        footer {
            text-align: center;
            padding: 28px;
            font-size: 13px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
            background: #fff;
        }

        footer a {
            color: #6366f1;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .nav {
                padding: 0 20px;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <div class="nav-left">
            <a href="{{ site.baseurl }}/" class="nav-logo">~/<span>tmux</span></a>
            <div class="nav-links">
                {% for cmd in site.data.commands %}
                {% if cmd.status == 'stable' %}
                <a href="{{ site.baseurl }}/{{ cmd.links.tutorial }}" class="nav-link">{{ cmd.name }}</a>
                {% endif %}
                {% endfor %}
            </div>
        </div>
        <span class="nav-badge">Claude Agent</span>
    </nav>

    <div class="content">
        {{ content }}
    </div>

    <footer>
        Built with <a href="https://claude.ai" target="_blank">Claude Agent Teams</a>
    </footer>

</body>

</html>
